name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Architecture & Quality Gates ────────────────────────────────────
  check:
    name: Architecture & Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install root dependencies
        run: npm install

      - name: Install UI dependencies (provides TypeScript for host type-check)
        run: npm install --prefix apps/windows-client/ui

      - name: L0-L4 Architecture compliance
        run: npm run check:arch

      - name: File size gate
        run: npm run check:filesize

      - name: Secrets scan
        run: npm run check:secrets

      - name: Host TypeScript type check
        run: npm run check:host-types

      - name: Icon assets check
        run: npm run check:icons

  # ── Job 2: Host Unit Tests ─────────────────────────────────────────────────
  test-host:
    name: Host Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run host unit tests
        # Excludes runtime-dependencies.test.js: those tests call
        # normalizeAgentCoworkRoot() which requires a Windows path ending in
        # "AgentCowork" — they are intentionally Windows-only.
        run: |
          cd apps/host
          FILES=$(ls test/*.test.js | grep -v runtime-dependencies.test.js)
          node --test --test-timeout=60000 --import ../../test-setup.mjs $FILES
        env:
          KCW_REQUIRE_AUTH: "false"
          KCW_TRUST_IDENTITY_HEADERS: "true"
          KCW_AUTH_PERSIST: "false"
          KCW_KIMI_API_KEY: ""
          KCW_SANDBOX_DOCKER_IMAGE: ""
