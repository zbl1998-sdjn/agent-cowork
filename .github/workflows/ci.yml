name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Architecture & Quality Gates ────────────────────────────────────
  check:
    name: Architecture & Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: L0-L4 Architecture compliance
        run: npm run check:arch

      - name: File size gate
        run: npm run check:filesize

      - name: Secrets scan
        run: npm run check:secrets

      - name: Host TypeScript type check
        run: npm run check:host-types

      - name: Icon assets check
        run: npm run check:icons

  # ── Job 2: Host Unit Tests ─────────────────────────────────────────────────
  test-host:
    name: Host Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run host unit tests
        run: |
          cd apps/host && node \
            --test \
            --test-isolation=process \
            --test-timeout=60000 \
            --import ../../test-setup.mjs \
            "test/*.test.js"
        env:
          # Open auth gate so tokenless functional tests are not 401'd.
          # auth-gate.test.js still verifies the gate by setting requireAuth:true.
          KCW_REQUIRE_AUTH: "false"
          # Legacy multi-tenant tests pass tenant headers for isolation checks.
          KCW_TRUST_IDENTITY_HEADERS: "true"
          # Use in-memory auth store; no auth.sqlite written to disk.
          KCW_AUTH_PERSIST: "false"
          # Disable external Kimi API calls in unit tests.
          KCW_KIMI_API_KEY: ""
          # Keep sandbox in local (non-Docker) mode so CI doesn't need Docker daemon.
          KCW_SANDBOX_DOCKER_IMAGE: ""
