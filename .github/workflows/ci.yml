name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Architecture & Quality Gates ────────────────────────────────────
  check:
    name: Architecture & Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install root dependencies
        run: npm install

      - name: Install UI dependencies (provides TypeScript for host type-check)
        run: npm install --prefix apps/windows-client/ui

      - name: L0-L4 Architecture compliance
        run: npm run check:arch

      - name: File size gate
        run: npm run check:filesize

      - name: Secrets scan
        run: npm run check:secrets

      - name: Host TypeScript type check
        run: npm run check:host-types

      - name: Icon assets check
        run: npm run check:icons

  # ── Job 2: Host Unit Tests ─────────────────────────────────────────────────
  test-host:
    name: Host Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run host unit tests
        # --test-isolation=process requires Node ≥22.8; drop the flag so the
        # runner works regardless of the exact Node 22.x patch installed.
        run: |
          cd apps/host && node \
            --test \
            --test-timeout=60000 \
            --import ../../test-setup.mjs \
            "test/*.test.js"
        env:
          KCW_REQUIRE_AUTH: "false"
          KCW_TRUST_IDENTITY_HEADERS: "true"
          KCW_AUTH_PERSIST: "false"
          KCW_KIMI_API_KEY: ""
          KCW_SANDBOX_DOCKER_IMAGE: ""
