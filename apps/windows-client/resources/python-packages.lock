# Pinned data-analysis + office-document Python packages preloaded into the
# embedded Python that ships with Agent Cowork. Listed in install order; pip
# resolves their transitive deps automatically.
#
# Picked to mirror what Claude Cowork's sandbox preloads (pandas/numpy/matplotlib/
# openpyxl/pillow/requests/lxml/bs4 etc.) so workflows like "analyse this xlsx",
# "summarise this docx" or "scrape this page" work zero-config out of the box.
#
# Lives OUTSIDE python-embedded/ so the prepare script's Clear-TargetDirectory
# pass doesn't nuke it on every re-stage. Versions are pinned (no ranges) so
# installs are reproducible; bump with intent + re-run
# scripts/prepare-embedded-python.ps1 -Force and verify installer size budget.
